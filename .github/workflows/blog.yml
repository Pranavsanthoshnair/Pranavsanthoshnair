name: Latest Blog Posts

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = "Pranavsanthoshnair";
            const repos = ["KMAP", "TruSight", "ClaimSight-AI"];
            const lines = [];

            for (const repo of repos) {
              try {
                const { data } = await github.rest.repos.listCommits({
                  owner,
                  repo,
                  per_page: 1,
                });

                if (data[0]) {
                  const message = data[0].commit.message.split("\n")[0];
                  const url = `https://github.com/${owner}/${repo}`;
                  lines.push(`- **[${repo}](${url})** — ${message}`);
                }
              } catch {
                // Skip repos that are private or unavailable.
              }
            }

            lines.push("- **[Portfolio](https://pranavsnair.vercel.app)** — Case studies and build notes");

            const start = "<!-- BLOG-POST-LIST:START -->";
            const end = "<!-- BLOG-POST-LIST:END -->";
            const section = `${start}\n${lines.join("\n")}\n${end}`;

            const { data: file } = await github.rest.repos.getContent({
              owner,
              repo: owner,
              path: "README.md",
            });

            const content = Buffer.from(file.content, "base64").toString("utf8");
            const updated = content.replace(
              new RegExp(`${start}[\\s\\S]*?${end}`),
              section
            );

            if (updated === content) {
              core.info("Blog section unchanged — skipping commit.");
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo: owner,
              path: "README.md",
              message: "docs: update latest writing section [skip ci]",
              content: Buffer.from(updated).toString("base64"),
              sha: file.sha,
            });
