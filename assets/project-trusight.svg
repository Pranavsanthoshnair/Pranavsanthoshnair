<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ts-title ts-desc">
  <title id="ts-title">TruSight — AI News Aggregation and Bias Detection</title>
  <desc id="ts-desc">AI-powered news aggregation and political bias detection platform with voice explanations and browser extension.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060D19"/>
      <stop offset="100%" stop-color="#0D1A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tag-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#1F6FEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <g opacity="0.12" stroke="#3B82F6" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="1000" y1="0" x2="1000" y2="200"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
  </g>

  <rect width="1200" height="200" fill="url(#glow)"/>
  <rect x="56" y="24" width="3" height="152" rx="2" fill="url(#accent-line)"/>

  <text x="80" y="54"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="2" fill="#58A6FF" fill-opacity="0.5">
    03
  </text>

  <text x="80" y="98"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="40" font-weight="700" letter-spacing="-1" fill="#FFFFFF">
    TruSight
  </text>

  <text x="80" y="128"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="400" fill="#8B949E">
    AI news aggregation and political bias detection with voice explanations.
  </text>

  <rect x="80"  y="148" width="118" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="139" y="163" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Bias Detection</text>

  <rect x="208" y="148" width="132" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="274" y="163" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">News Aggregation</text>

  <rect x="350" y="148" width="90" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="395" y="163" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Voice AI</text>

  <rect x="450" y="148" width="138" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="519" y="163" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Browser Extension</text>

  <text x="1120" y="163" text-anchor="end"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#6E7681">
    Next.js · TypeScript · Supabase · AI APIs
  </text>

  <rect x="0.5" y="0.5" width="1199" height="199" rx="0" fill="none" stroke="#21262D" stroke-width="1"/>
</svg>
