<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="wib-title" role="img" viewBox="0 0 1200 300"><title id="wib-title">Why I Build — The problem comes first. Trust is the product.</title><defs><linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#0A0E14"/></linearGradient><linearGradient id="card-border-l" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#1F6FEB" stop-opacity=".8"/><stop offset="100%" stop-color="#1F6FEB" stop-opacity=".2"/></linearGradient><linearGradient id="card-border-r" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#58A6FF" stop-opacity=".8"/><stop offset="100%" stop-color="#58A6FF" stop-opacity=".2"/></linearGradient><linearGradient id="divider-l" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#1F6FEB" stop-opacity=".9"/><stop offset="100%" stop-color="#1F6FEB" stop-opacity=".1"/></linearGradient><linearGradient id="divider-r" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#58A6FF" stop-opacity=".9"/><stop offset="100%" stop-color="#58A6FF" stop-opacity=".1"/></linearGradient><radialGradient id="glow-l" cx="20%" cy="50%" r="60%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#1F6FEB" stop-opacity=".06"/><stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/></radialGradient><radialGradient id="glow-r" cx="80%" cy="50%" r="60%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#58A6FF" stop-opacity=".05"/><stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/></radialGradient></defs><rect width="1200" height="300" fill="url(#bg)"/><rect width="1200" height="300" fill="url(#glow-l)"/><rect width="1200" height="300" fill="url(#glow-r)"/><rect width="548" height="252" x="40" y="24" fill="#161B22" stroke="#21262D" stroke-width="1" rx="12"/><rect width="3" height="252" x="40" y="24" fill="url(#card-border-l)" rx="2"/><text x="80" y="72" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700">The problem comes first.</text><text x="80" y="108" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400">I build because <tspan fill="#C9D1D9" font-weight="600">useful software</tspan> can make complex</text><text x="80" y="128" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400">work feel lighter — verifying an insurance claim,</text><text x="80" y="148" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400">helping a learner study offline, or giving people</text><text x="80" y="168" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400">clearer context around the news they read.</text><line x1="80" x2="540" y1="202" y2="202" stroke="url(#divider-l)" stroke-width="1"/><text x="80" y="232" fill="#58A6FF" fill-opacity=".7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" letter-spacing="1">FOCUS</text><text x="80" y="252" fill="#6E7681" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="400">Real inconveniences, not abstract ideas</text><rect width="548" height="252" x="612" y="24" fill="#161B22" stroke="#21262D" stroke-width="1" rx="12"/><rect width="3" height="252" x="612" y="24" fill="url(#card-border-r)" rx="2"/><text x="652" y="72" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="700">Trust is the product.</text><text x="652" y="108" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400">My focus isn&apos;t just on making things work — it&apos;s on</text><text x="652" y="128" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400">making them <tspan fill="#C9D1D9" font-weight="600">understandable</tspan>, <tspan fill="#C9D1D9" font-weight="600">reliable</tspan>, and</text><text x="652" y="148" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400"><tspan fill="#C9D1D9" font-weight="600">polished</tspan> enough for real people to trust.</text><text x="652" y="168" fill="#8B949E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13.5" font-weight="400"><tspan fill="#C9D1D9" font-weight="600">Automation</tspan> should reduce friction, not create it.</text><line x1="652" x2="1112" y1="202" y2="202" stroke="url(#divider-r)" stroke-width="1"/><text x="652" y="232" fill="#58A6FF" fill-opacity=".7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" letter-spacing="1">STANDARD</text><text x="652" y="252" fill="#6E7681" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="400">Ship what people can rely on</text></svg>