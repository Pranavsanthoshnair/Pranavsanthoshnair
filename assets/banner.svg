<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" fill="none" aria-labelledby="banner-title banner-desc" role="img" viewBox="0 0 1200 280"><title id="banner-title">Product engineering pillars banner</title><desc id="banner-desc">Three cards: AI Systems, Product Thinking, and Polished Engineering — the three pillars of Pranav&apos;s work.</desc><defs><linearGradient id="outerBorder" x1="0" x2="1200" y1="0" y2="280" gradientUnits="userSpaceOnUse"><stop stop-color="#58A6FF" stop-opacity=".3"/><stop offset="1" stop-color="#1F6FEB" stop-opacity=".05"/></linearGradient><linearGradient id="shimmer1" x1="0" x2="1" y1="0" y2="0" gradientUnits="objectBoundingBox"><stop stop-color="#1F6FEB" stop-opacity="0"/><stop offset=".5" stop-color="#58A6FF" stop-opacity=".15"/><stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/></linearGradient><style>.card-surface{fill:#f8fafc;stroke:#dce9ff;stroke-width:1.2}.card-chip{fill:#eef4ff;stroke:#c7daff;stroke-width:1}.card-tag{fill:#1f6feb}.card-headline{fill:#0f172a}.card-body{fill:#64748b}.dot-accent{fill:#1f6feb}.icon-stroke{stroke:#1f6feb}@media (prefers-color-scheme:dark){.card-surface{fill:#161b22;stroke:#21262d;stroke-width:1.2}.card-chip{fill:#1c2433;stroke:#2d3748;stroke-width:1}.card-tag{fill:#58a6ff}.card-headline{fill:#e6edf3}.card-body{fill:#8b949e}.dot-accent{fill:#58a6ff}.icon-stroke{stroke:#58a6ff}}</style></defs><rect width="1198" height="278" x="1" y="1" fill="transparent" stroke="url(#outerBorder)" rx="22"/><rect width="1198" height="1" x="1" y="1" fill="url(#shimmer1)" opacity=".6" rx="1"/><rect width="340" height="208" x="60" y="36" class="card-surface" rx="18"/><rect width="118" height="28" x="80" y="56" class="card-chip" rx="14"/><text x="139" y="75" class="card-tag" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" text-anchor="middle">AI SYSTEMS</text><circle cx="374" cy="70" r="16" fill="#1F6FEB" fill-opacity=".08"><animate attributeName="fill-opacity" dur="4s" repeatCount="indefinite" values="0.05;0.14;0.05"/></circle><path fill="none" stroke-linecap="round" stroke-width="1.8" d="M367 70H381M374 63V77" class="icon-stroke"/><text x="80" y="122" class="card-headline" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-.5">Multimodal</text><text x="80" y="148" class="card-headline" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-.5">Reasoning</text><text x="80" y="176" class="card-body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">Vision AI, automation pipelines,</text><text x="80" y="196" class="card-body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">and intelligent decision support.</text><circle cx="80" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><circle cx="93" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" begin="0.35s" dur="2.2s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><circle cx="106" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" begin="0.7s" dur="2.2s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><rect width="340" height="208" x="430" y="36" class="card-surface" rx="18"/><rect width="148" height="28" x="450" y="56" class="card-chip" rx="14"/><text x="524" y="75" class="card-tag" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" text-anchor="middle">PRODUCT THINKING</text><rect width="24" height="24" x="732" y="54" fill="#1F6FEB" fill-opacity=".09" rx="6"/><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M736 66L740 70L748 62" class="icon-stroke"/><text x="450" y="122" class="card-headline" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-.5">User-Centric</text><text x="450" y="148" class="card-headline" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-.5">Design</text><text x="450" y="176" class="card-body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">Useful flows, clear decisions,</text><text x="450" y="196" class="card-body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">and interfaces people can trust.</text><circle cx="450" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><circle cx="463" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" begin="0.35s" dur="2.6s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><circle cx="476" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" begin="0.7s" dur="2.6s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><rect width="340" height="208" x="800" y="36" class="card-surface" rx="18"/><rect width="176" height="28" x="820" y="56" class="card-chip" rx="14"/><text x="908" y="75" class="card-tag" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" text-anchor="middle">POLISHED ENGINEERING</text><path fill="none" stroke-linecap="round" stroke-width="1.8" d="M1092 62H1112M1092 70H1106M1092 78H1109" class="icon-stroke"/><text x="820" y="122" class="card-headline" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-.5">Ship. Iterate.</text><text x="820" y="148" class="card-headline" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-.5">Refine.</text><text x="820" y="176" class="card-body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">Clean systems, thoughtful UX,</text><text x="820" y="196" class="card-body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">and practical software that ships.</text><circle cx="820" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" dur="2.0s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><circle cx="833" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" begin="0.35s" dur="2.0s" repeatCount="indefinite" values="0.3;1;0.3"/></circle><circle cx="846" cy="222" r="3.5" class="dot-accent"><animate attributeName="opacity" begin="0.7s" dur="2.0s" repeatCount="indefinite" values="0.3;1;0.3"/></circle></svg>