<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">Product engineering pillars banner</title>
  <desc id="banner-desc">Three cards: AI Systems, Product Thinking, and Polished Engineering — the three pillars of Pranav's work.</desc>

  <defs>
    <linearGradient id="outerBorder" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="shimmer1" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#1F6FEB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58A6FF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <style>
      .card-surface { fill: #F8FAFC; stroke: #DCE9FF; stroke-width: 1.2; }
      .card-chip { fill: #EEF4FF; stroke: #C7DAFF; stroke-width: 1; }
      .card-tag { fill: #1F6FEB; }
      .card-headline { fill: #0F172A; }
      .card-body { fill: #64748B; }
      .dot-accent { fill: #1F6FEB; }
      .icon-stroke { stroke: #1F6FEB; }
      @media (prefers-color-scheme: dark) {
        .card-surface { fill: #161B22; stroke: #21262D; stroke-width: 1.2; }
        .card-chip { fill: #1C2433; stroke: #2D3748; stroke-width: 1; }
        .card-tag { fill: #58A6FF; }
        .card-headline { fill: #E6EDF3; }
        .card-body { fill: #8B949E; }
        .dot-accent { fill: #58A6FF; }
        .icon-stroke { stroke: #58A6FF; }
      }
    </style>
  </defs>

  <!-- Outer frame -->
  <rect x="1" y="1" width="1198" height="278" rx="22" fill="transparent" stroke="url(#outerBorder)"/>

  <!-- Subtle shimmer line -->
  <rect x="1" y="1" width="1198" height="1" rx="1" fill="url(#shimmer1)" opacity="0.6"/>

  <!-- ── Card 1: AI Systems ── -->
  <rect class="card-surface" x="60" y="36" width="340" height="208" rx="18"/>

  <!-- Top chip -->
  <rect class="card-chip" x="80" y="56" width="118" height="28" rx="14"/>
  <text class="card-tag" x="139" y="75" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">AI SYSTEMS</text>

  <!-- Animated icon -->
  <circle cx="374" cy="70" r="16" fill="#1F6FEB" fill-opacity="0.08">
    <animate attributeName="fill-opacity" values="0.05;0.14;0.05" dur="4s" repeatCount="indefinite"/>
  </circle>
  <path class="icon-stroke" d="M367 70H381M374 63V77" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <text class="card-headline" x="80" y="122" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-0.5">Multimodal</text>
  <text class="card-headline" x="80" y="148" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-0.5">Reasoning</text>

  <text class="card-body" x="80" y="176" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">Vision AI, automation pipelines,</text>
  <text class="card-body" x="80" y="196" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">and intelligent decision support.</text>

  <!-- Pulsing dots -->
  <circle class="dot-accent" cx="80" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle class="dot-accent" cx="93" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" begin="0.35s" repeatCount="indefinite"/></circle>
  <circle class="dot-accent" cx="106" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" begin="0.7s" repeatCount="indefinite"/></circle>

  <!-- ── Card 2: Product Thinking ── -->
  <rect class="card-surface" x="430" y="36" width="340" height="208" rx="18"/>

  <rect class="card-chip" x="450" y="56" width="148" height="28" rx="14"/>
  <text class="card-tag" x="524" y="75" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">PRODUCT THINKING</text>

  <!-- Checkmark icon -->
  <rect x="732" y="54" width="24" height="24" rx="6" fill="#1F6FEB" fill-opacity="0.09"/>
  <path class="icon-stroke" d="M736 66L740 70L748 62" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <text class="card-headline" x="450" y="122" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-0.5">User-Centric</text>
  <text class="card-headline" x="450" y="148" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-0.5">Design</text>

  <text class="card-body" x="450" y="176" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">Useful flows, clear decisions,</text>
  <text class="card-body" x="450" y="196" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">and interfaces people can trust.</text>

  <circle class="dot-accent" cx="450" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle class="dot-accent" cx="463" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="0.35s" repeatCount="indefinite"/></circle>
  <circle class="dot-accent" cx="476" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="0.7s" repeatCount="indefinite"/></circle>

  <!-- ── Card 3: Polished Engineering ── -->
  <rect class="card-surface" x="800" y="36" width="340" height="208" rx="18"/>

  <rect class="card-chip" x="820" y="56" width="176" height="28" rx="14"/>
  <text class="card-tag" x="908" y="75" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">POLISHED ENGINEERING</text>

  <!-- Lines icon -->
  <path class="icon-stroke" d="M1092 62H1112M1092 70H1106M1092 78H1109" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <text class="card-headline" x="820" y="122" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-0.5">Ship. Iterate.</text>
  <text class="card-headline" x="820" y="148" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" letter-spacing="-0.5">Refine.</text>

  <text class="card-body" x="820" y="176" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">Clean systems, thoughtful UX,</text>
  <text class="card-body" x="820" y="196" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13">and practical software that ships.</text>

  <circle class="dot-accent" cx="820" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" repeatCount="indefinite"/></circle>
  <circle class="dot-accent" cx="833" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" begin="0.35s" repeatCount="indefinite"/></circle>
  <circle class="dot-accent" cx="846" cy="222" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" begin="0.7s" repeatCount="indefinite"/></circle>
</svg>
