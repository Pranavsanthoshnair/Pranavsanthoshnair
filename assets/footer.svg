<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Building. Learning. Shipping. Repeating.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#1F6FEB" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#58A6FF" stop-opacity="0.85"/>
      <stop offset="75%"  stop-color="#1F6FEB" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="120" fill="url(#bg)"/>
  <line x1="160" y1="36" x2="1040" y2="36" stroke="url(#rule)" stroke-width="1"/>

  <!-- Centred word row -->
  <text x="600" y="68" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="18" font-weight="700" letter-spacing="0.5" fill="#1F6FEB">
    Building  ·  Learning  ·  Shipping  ·  Repeating
  </text>

  <!-- Centred subline -->
  <text x="600" y="96" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="400" letter-spacing="2" fill="#6E7681">
    CS ENGINEERING · FULL STACK · AI BUILDER
  </text>
</svg>
