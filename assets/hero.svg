<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="h-title h-desc">
  <title id="h-title">Pranav S Nair — Full Stack Developer and AI Builder</title>
  <desc id="h-desc">CS Engineering Student. Full Stack Developer. AI Builder. Building AI-powered software that solves real-world problems.</desc>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <radialGradient id="glow-c" cx="50%" cy="46%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#1F6FEB" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-l" cx="12%" cy="55%" r="35%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#58A6FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="88%" cy="40%" r="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#388BFD" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#388BFD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C9D1D9"/>
      <stop offset="40%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#79B8FF"/>
    </linearGradient>
    <linearGradient id="rule-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#1F6FEB" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#58A6FF" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#1F6FEB" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pill-primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#388BFD"/>
    </linearGradient>
    <linearGradient id="bottom-vignette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="320" fill="url(#bg-grad)"/>

  <!-- Grid — vertical lines, 100px spacing -->
  <g opacity="0.18" stroke="#3B82F6" stroke-width="0.5">
    <line x1="100"  y1="0" x2="100"  y2="320"/>
    <line x1="200"  y1="0" x2="200"  y2="320"/>
    <line x1="300"  y1="0" x2="300"  y2="320"/>
    <line x1="400"  y1="0" x2="400"  y2="320"/>
    <line x1="500"  y1="0" x2="500"  y2="320"/>
    <line x1="600"  y1="0" x2="600"  y2="320"/>
    <line x1="700"  y1="0" x2="700"  y2="320"/>
    <line x1="800"  y1="0" x2="800"  y2="320"/>
    <line x1="900"  y1="0" x2="900"  y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>
  <!-- Grid — horizontal lines, 64px spacing -->
  <g opacity="0.18" stroke="#3B82F6" stroke-width="0.5">
    <line x1="0" y1="64"  x2="1200" y2="64"/>
    <line x1="0" y1="128" x2="1200" y2="128"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="256" x2="1200" y2="256"/>
  </g>

  <!-- Radial glow overlays -->
  <rect width="1200" height="320" fill="url(#glow-c)"/>
  <rect width="1200" height="320" fill="url(#glow-l)"/>
  <rect width="1200" height="320" fill="url(#glow-r)"/>

  <!-- Eyebrow -->
  <text
    x="600" y="88"
    text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" letter-spacing="4"
    fill="#58A6FF" fill-opacity="0.75">
    COMPUTER SCIENCE ENGINEERING · KERALA, INDIA
  </text>

  <!-- Name -->
  <text
    x="600" y="162"
    text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="68" font-weight="700" letter-spacing="-2"
    fill="url(#name-fill)">
    Pranav S Nair
  </text>

  <!-- Value proposition -->
  <text
    x="600" y="198"
    text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="400" letter-spacing="0.3"
    fill="#8B949E">
    Building AI-powered software that solves real-world problems.
  </text>

  <!-- Horizontal rule -->
  <line x1="300" y1="220" x2="900" y2="220" stroke="url(#rule-h)" stroke-width="1"/>

  <!-- Social pills -->
  <!-- Portfolio — primary blue -->
  <rect x="230" y="236" width="102" height="30" rx="15" fill="url(#pill-primary)"/>
  <text x="281" y="255" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11.5" font-weight="600" fill="#FFFFFF">Portfolio</text>

  <!-- GitHub -->
  <rect x="345" y="236" width="92" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="391" y="255" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11.5" font-weight="500" fill="#8B949E">GitHub</text>

  <!-- LinkedIn -->
  <rect x="450" y="236" width="100" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="500" y="255" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11.5" font-weight="500" fill="#8B949E">LinkedIn</text>

  <!-- Email -->
  <rect x="563" y="236" width="82" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="604" y="255" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11.5" font-weight="500" fill="#8B949E">Email</text>

  <!-- LeetCode -->
  <rect x="658" y="236" width="98" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="707" y="255" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11.5" font-weight="500" fill="#8B949E">LeetCode</text>

  <!-- Bottom vignette fade -->
  <rect x="0" y="270" width="1200" height="50" fill="url(#bottom-vignette)"/>
</svg>
