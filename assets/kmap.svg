<svg width="960" height="580" viewBox="0 0 960 580" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KMAP — Knowledge Mapping Adaptive Platform</title>
  <desc id="desc">A polished adaptive learning platform dashboard with knowledge capsules, progress tracking, and offline-first design.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F7FF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="prog1" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1F6FEB" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" rx="28" fill="url(#bg)"/>

  <!-- Window frame -->
  <rect x="32" y="28" width="896" height="524" rx="22" fill="white" filter="url(#cardShadow)" stroke="#D7E8FF" stroke-width="1"/>

  <!-- Titlebar -->
  <rect x="32" y="28" width="896" height="56" rx="22" fill="url(#hdr)"/>
  <rect x="32" y="62" width="896" height="22" fill="url(#hdr)"/>

  <!-- Traffic lights -->
  <circle cx="70" cy="56" r="8" fill="#FF5F57"/>
  <circle cx="94" cy="56" r="8" fill="#FFBD2E"/>
  <circle cx="118" cy="56" r="8" fill="#28C840"/>

  <!-- App name -->
  <text x="148" y="63" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="750">KMAP</text>
  <text x="204" y="63" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400">Knowledge Mapping Adaptive Platform</text>

  <!-- Offline badge -->
  <rect x="718" y="44" width="84" height="26" rx="13" fill="#22C55E" fill-opacity="0.12" stroke="#22C55E" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="733" cy="57" r="4" fill="#22C55E"/>
  <text x="759" y="62" text-anchor="middle" fill="#166534" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Offline</text>
  <rect x="812" y="44" width="88" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.08" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="856" y="62" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Adaptive</text>

  <!-- Sidebar -->
  <rect x="32" y="84" width="200" height="468" rx="0" fill="#F8FAFC" stroke="#E8F0FF" stroke-width="1"/>
  <rect x="32" y="84" width="200" height="468" rx="0" fill="#F8FAFC"/>

  <!-- Sidebar nav -->
  <text x="54" y="116" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">MY LEARNING</text>
  <rect x="44" y="126" width="176" height="34" rx="8" fill="#1F6FEB" fill-opacity="0.08"/>
  <text x="62" y="148" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Dashboard</text>
  <text x="62" y="182" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Capsules</text>
  <text x="62" y="216" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Practice</text>
  <text x="62" y="250" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Progress</text>
  <text x="54" y="290" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">SUBJECTS</text>
  <text x="62" y="316" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Mathematics</text>
  <text x="62" y="350" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Science</text>
  <text x="62" y="384" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">English</text>
  <text x="62" y="418" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Social Studies</text>

  <!-- Offline indicator -->
  <rect x="44" y="510" width="176" height="56" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="62" y="534" fill="#166534" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">● Offline ready</text>
  <text x="62" y="552" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Last synced: 2 hours ago</text>

  <!-- Main content area -->
  <!-- Welcome -->
  <text x="260" y="116" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="750">Good morning, Arjun 👋</text>
  <text x="260" y="138" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">You're on a 12-day streak. Keep going!</text>

  <!-- Streak badge -->
  <rect x="632" y="100" width="132" height="48" rx="12" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="698" y="122" text-anchor="middle" fill="#92400E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">🔥</text>
  <text x="698" y="140" text-anchor="middle" fill="#92400E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">12-day streak</text>

  <!-- Progress cards row -->
  <rect x="260" y="160" width="200" height="80" rx="14" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="280" y="190" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">CAPSULES DONE</text>
  <text x="280" y="222" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="750">34</text>
  <text x="316" y="222" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">/ 50</text>

  <rect x="474" y="160" width="200" height="80" rx="14" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="494" y="190" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">ACCURACY</text>
  <text x="494" y="222" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="750">87%</text>

  <rect x="688" y="160" width="196" height="80" rx="14" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="708" y="190" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">TIME TODAY</text>
  <text x="708" y="222" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="750">42<tspan font-size="16" font-weight="500" fill="#64748B">min</tspan></text>

  <!-- Adaptive question card -->
  <rect x="260" y="260" width="424" height="180" rx="16" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="260" y="260" width="424" height="40" rx="16" fill="#1F6FEB" fill-opacity="0.05"/>
  <rect x="260" y="280" width="424" height="20" fill="#1F6FEB" fill-opacity="0.05"/>
  <text x="280" y="287" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1">ADAPTIVE PRACTICE · MEDIUM</text>
  <text x="280" y="322" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">If 3x + 7 = 22, find the value of x.</text>
  <!-- Options -->
  <rect x="280" y="336" width="370" height="30" rx="8" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1"/>
  <text x="300" y="356" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">A.  x = 3</text>
  <rect x="280" y="374" width="370" height="30" rx="8" fill="#EFF6FF" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="300" y="394" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">B.  x = 5 ← Correct</text>
  <text x="560" y="394" fill="#22C55E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="280" y="428" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Procedurally generated &nbsp;·&nbsp; Rule engine adapted difficulty</text>

  <!-- Knowledge capsule list -->
  <rect x="698" y="260" width="190" height="280" rx="16" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="718" y="292" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Knowledge Capsules</text>
  <!-- Capsule items -->
  <rect x="714" y="304" width="158" height="36" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="730" y="320" fill="#166534" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">✓ Fractions</text>
  <text x="730" y="333" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">12 questions · 94%</text>
  <rect x="714" y="348" width="158" height="36" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="730" y="364" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">→ Algebra I</text>
  <text x="730" y="377" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">In progress · 8/20</text>
  <rect x="714" y="392" width="158" height="36" rx="8" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1"/>
  <text x="730" y="408" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Geometry</text>
  <text x="730" y="421" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Locked · Complete Algebra I</text>
  <rect x="714" y="436" width="158" height="36" rx="8" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1"/>
  <text x="730" y="452" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Statistics</text>
  <text x="730" y="465" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Locked</text>
  <rect x="714" y="480" width="158" height="36" rx="8" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1"/>
  <text x="730" y="496" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Trigonometry</text>
  <text x="730" y="509" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Locked</text>

  <!-- Bottom: Stack tags -->
  <rect x="260" y="458" width="424" height="68" rx="14" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1"/>
  <text x="280" y="484" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Stack</text>
  <rect x="280" y="494" width="70" height="22" rx="11" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="315" y="509" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Next.js</text>
  <rect x="360" y="494" width="62" height="22" rx="11" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="391" y="509" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">React</text>
  <rect x="432" y="494" width="82" height="22" rx="11" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="473" y="509" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Supabase</text>
  <rect x="524" y="494" width="74" height="22" rx="11" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="561" y="509" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Tailwind</text>
  <rect x="608" y="494" width="62" height="22" rx="11" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="639" y="509" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">TypeScript</text>
</svg>
