<svg width="960" height="580" viewBox="0 0 960 580" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClaimSight AI — Insurance Claim Verification Platform</title>
  <desc id="desc">A polished AI-powered insurance claim verification dashboard featuring Vision AI, decision engine, and trust scoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F7FF"/>
      <stop offset="1" stop-color="#E8F3FF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="trustGrad" x1="0" y1="0" x2="190" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <linearGradient id="imgGrad" x1="106" y1="168" x2="106" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1F6FEB" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" rx="28" fill="url(#bg)"/>

  <!-- Window frame -->
  <rect x="32" y="28" width="896" height="524" rx="22" fill="white" filter="url(#cardShadow)" stroke="#D7E8FF" stroke-width="1"/>

  <!-- Titlebar -->
  <rect x="32" y="28" width="896" height="56" rx="22" fill="url(#headerGrad)"/>
  <rect x="32" y="62" width="896" height="22" fill="url(#headerGrad)"/>

  <!-- Traffic lights -->
  <circle cx="70" cy="56" r="8" fill="#FF5F57"/>
  <circle cx="94" cy="56" r="8" fill="#FFBD2E"/>
  <circle cx="118" cy="56" r="8" fill="#28C840"/>

  <!-- App name -->
  <text x="148" y="63" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="750">ClaimSight AI</text>

  <!-- Nav items -->
  <text x="560" y="63" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Dashboard</text>
  <text x="632" y="63" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Claims</text>
  <text x="690" y="63" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Reports</text>

  <!-- Status chip -->
  <rect x="740" y="44" width="152" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.08" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="757" cy="57" r="4" fill="#22C55E"/>
  <text x="769" y="62" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Live · Verified Mode</text>

  <!-- Left panel: Evidence image card -->
  <rect x="56" y="108" width="284" height="388" rx="18" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="78" y="138" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Evidence Panel</text>
  <text x="78" y="156" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Vehicle damage — front bumper</text>

  <!-- Image mock -->
  <rect x="72" y="166" width="252" height="160" rx="14" fill="url(#imgGrad)"/>
  <path d="M98 300L158 236L200 280L234 250L298 300" stroke="#1F6FEB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="262" cy="210" r="20" fill="#58A6FF" fill-opacity="0.8"/>
  <circle cx="262" cy="210" r="12" fill="white"/>
  <path d="M257 210L261 214L269 206" stroke="#1F6FEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label below image -->
  <text x="78" y="350" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Analysis complete</text>
  <text x="78" y="370" fill="#22C55E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">✓ 4 damage zones detected</text>

  <!-- Trust bar -->
  <rect x="78" y="388" width="220" height="10" rx="5" fill="#1F6FEB" fill-opacity="0.12"/>
  <rect x="78" y="388" width="180" height="10" rx="5" fill="url(#trustGrad)"/>
  <text x="78" y="416" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Image confidence &nbsp;·&nbsp; 82%</text>

  <!-- Claim metadata -->
  <rect x="78" y="430" width="246" height="48" rx="10" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1"/>
  <text x="94" y="452" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">CLM-2024-00481</text>
  <text x="94" y="468" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Submitted 2024-11-14 &nbsp;·&nbsp; Auto policy</text>

  <!-- Right side: Top row — Decision Engine -->
  <rect x="360" y="108" width="572" height="86" rx="16" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="384" y="142" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Decision Engine</text>
  <text x="384" y="164" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Cross-referencing document metadata, image signals, and claim history via Gemini Vision.</text>
  <rect x="832" y="122" width="78" height="28" rx="14" fill="#DCFCE7"/>
  <text x="871" y="141" text-anchor="middle" fill="#166534" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="750">82% trust</text>

  <!-- Right side: Middle row — Signals + Outcome -->
  <rect x="360" y="212" width="274" height="166" rx="16" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="382" y="244" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Evidence Signals</text>
  <rect x="382" y="258" width="200" height="10" rx="5" fill="#DBEAFE"/>
  <rect x="382" y="258" width="180" height="10" rx="5" fill="#1F6FEB"/>
  <text x="382" y="285" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Photo match</text>
  <rect x="382" y="292" width="200" height="10" rx="5" fill="#DBEAFE"/>
  <rect x="382" y="292" width="148" height="10" rx="5" fill="#58A6FF"/>
  <text x="382" y="320" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Document consistency</text>
  <rect x="382" y="327" width="200" height="10" rx="5" fill="#DBEAFE"/>
  <rect x="382" y="327" width="162" height="10" rx="5" fill="#1F6FEB"/>
  <text x="382" y="355" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Claim history</text>

  <!-- Outcome card -->
  <rect x="654" y="212" width="278" height="166" rx="16" fill="white" stroke="#D7E8FF" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="676" y="244" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Verdict</text>
  <circle cx="793" cy="320" r="52" fill="#1F6FEB" fill-opacity="0.07"/>
  <circle cx="793" cy="320" r="36" fill="#1F6FEB" fill-opacity="0.10"/>
  <path d="M769 320L784 335L820 295" stroke="#1F6FEB" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="793" y="358" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Approved</text>

  <!-- Right side: Bottom row — Stack tags -->
  <rect x="360" y="396" width="572" height="100" rx="16" fill="#F8FAFC" stroke="#D7E8FF" stroke-width="1"/>
  <text x="384" y="424" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Stack</text>
  <rect x="384" y="436" width="72" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="420" y="454" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Python</text>
  <rect x="466" y="436" width="70" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="501" y="454" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Gemini</text>
  <rect x="546" y="436" width="80" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="586" y="454" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Streamlit</text>
  <rect x="636" y="436" width="72" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="672" y="454" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Vision AI</text>
  <rect x="718" y="436" width="102" height="26" rx="13" fill="#1F6FEB" fill-opacity="0.10" stroke="#1F6FEB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="769" y="454" text-anchor="middle" fill="#1F6FEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Multimodal AI</text>
  <text x="384" y="482" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">TechThrive 2.0 National Hackathon · Winner</text>
</svg>
