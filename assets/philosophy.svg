<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" fill="none" aria-labelledby="phil-title" role="img" viewBox="0 0 1200 360"><title id="phil-title">Engineering Philosophy — Pranav S Nair</title><defs><linearGradient id="philBg" x1="0" x2="1200" y1="0" y2="360" gradientUnits="userSpaceOnUse"><stop stop-color="#F0F7FF"/><stop offset="1" stop-color="#EAF3FF"/></linearGradient><linearGradient id="philAccent" x1="0" x2="0" y1="0" y2="320" gradientUnits="userSpaceOnUse"><stop stop-color="#1F6FEB" stop-opacity="0"/><stop offset=".4" stop-color="#58A6FF" stop-opacity=".9"/><stop offset=".6" stop-color="#1F6FEB" stop-opacity=".9"/><stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/></linearGradient><linearGradient id="philPill" x1="0" x2="220" y1="0" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/></linearGradient><linearGradient id="philBorder" x1="0" x2="1200" y1="0" y2="360" gradientUnits="userSpaceOnUse"><stop stop-color="#1F6FEB" stop-opacity=".08"/><stop offset=".5" stop-color="#58A6FF" stop-opacity=".25"/><stop offset="1" stop-color="#1F6FEB" stop-opacity=".08"/></linearGradient><filter id="philOrb"><feGaussianBlur stdDeviation="45"/></filter><style>.ph{fill:#334155}.pha{fill:#1f6feb}@media (prefers-color-scheme:dark){.ph{fill:#94a3b8}.pha{fill:#58a6ff}}</style></defs><rect width="1200" height="360" fill="url(#philBg)" rx="24"/><circle cx="200" cy="80" r="90" fill="#58A6FF" fill-opacity=".06" filter="url(#philOrb)"><animate attributeName="cx" dur="11s" repeatCount="indefinite" values="180;220;180"/></circle><circle cx="1050" cy="300" r="80" fill="#1F6FEB" fill-opacity=".07" filter="url(#philOrb)"><animate attributeName="cx" dur="9s" repeatCount="indefinite" values="1030;1070;1030"/></circle><rect width="1198" height="358" x="1" y="1" fill="none" stroke="url(#philBorder)" stroke-width="1.5" rx="24"/><rect width="3" height="320" x="60" y="20" fill="url(#philAccent)" rx="2"/><rect width="212" height="30" x="80" y="36" fill="url(#philPill)" rx="15"/><text x="186" y="56" fill="#E6EDF3" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" text-anchor="middle">ENGINEERING PHILOSOPHY</text><text x="80" y="106" class="pha" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing=".5">SPECIFICITY OVER ABSTRACTION</text><text x="80" y="130" class="ph" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15">The most valuable software starts as a specific inconvenience — not an abstract market opportunity.</text><text x="80" y="152" class="ph" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15">Build for those moments: the adjuster who has to manually cross-check fifty documents, the student</text><text x="80" y="174" class="ph" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15">in a village without internet, the reader who can&apos;t tell if an article is slanted.</text><line x1="80" x2="600" y1="194" y2="194" stroke="#1F6FEB" stroke-opacity=".15" stroke-width="1"/><text x="80" y="220" class="pha" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing=".5">SHIP NARROW, ITERATE WIDE</text><text x="80" y="244" class="ph" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15">Ship the narrow, working version first. Watch where it breaks for actual users. Iterate until the</text><text x="80" y="266" class="ph" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15">experience feels inevitable rather than engineered. With AI in the stack, that contract becomes</text><text x="80" y="288" class="ph" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15">critical — intelligent automation should reduce friction, not add mystery.</text><rect width="96" height="30" x="80" y="314" fill="#1F6FEB" fill-opacity=".1" stroke="#1F6FEB" stroke-opacity=".25" stroke-width="1" rx="15"/><text x="128" y="333" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">Ship First</text><rect width="96" height="30" x="188" y="314" fill="#1F6FEB" fill-opacity=".1" stroke="#1F6FEB" stroke-opacity=".25" stroke-width="1" rx="15"/><text x="236" y="333" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">Iterate Fast</text><rect width="116" height="30" x="296" y="314" fill="#1F6FEB" fill-opacity=".1" stroke="#1F6FEB" stroke-opacity=".25" stroke-width="1" rx="15"/><text x="354" y="333" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">Design Matters</text><rect width="126" height="30" x="424" y="314" fill="#1F6FEB" fill-opacity=".1" stroke="#1F6FEB" stroke-opacity=".25" stroke-width="1" rx="15"/><text x="487" y="333" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">Always Learning</text><circle cx="1120" cy="180" r="5" fill="#1F6FEB" fill-opacity=".15"><animate attributeName="r" dur="3s" repeatCount="indefinite" values="4;10;4"/><animate attributeName="fill-opacity" dur="3s" repeatCount="indefinite" values="0.15;0.04;0.15"/></circle><circle cx="1120" cy="180" r="3" fill="#58A6FF"><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.4;1;0.4"/></circle></svg>