<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="km-title km-desc">
  <title id="km-title">KMAP — Knowledge Mapping Adaptive Platform</title>
  <desc id="km-desc">Privacy-first adaptive learning platform designed for rural and low-bandwidth environments with offline-first architecture.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060D19"/>
      <stop offset="100%" stop-color="#0A1929"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tag-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#1F6FEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <g opacity="0.12" stroke="#3B82F6" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="1000" y1="0" x2="1000" y2="200"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
  </g>

  <rect width="1200" height="200" fill="url(#glow)"/>
  <rect x="56" y="24" width="3" height="152" rx="2" fill="url(#accent-line)"/>

  <text x="80" y="54"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="2" fill="#58A6FF" fill-opacity="0.5">
    02
  </text>

  <text x="80" y="98"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="40" font-weight="700" letter-spacing="-1" fill="#FFFFFF">
    KMAP
  </text>

  <text x="80" y="118"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="400" fill="#58A6FF" fill-opacity="0.6">
    Knowledge Mapping Adaptive Platform
  </text>

  <text x="80" y="140"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="400" fill="#8B949E">
    Privacy-first adaptive learning for rural and low-bandwidth environments.
  </text>

  <rect x="80"  y="152" width="118" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="139" y="167" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Offline Learning</text>

  <rect x="208" y="152" width="126" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="271" y="167" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Adaptive Engine</text>

  <rect x="344" y="152" width="138" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="413" y="167" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Knowledge Capsules</text>

  <rect x="492" y="152" width="114" height="22" rx="11" fill="url(#tag-bg)" stroke="#1F6FEB" stroke-opacity="0.4" stroke-width="1"/>
  <text x="549" y="167" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#79B8FF">Low Bandwidth</text>

  <text x="1120" y="167" text-anchor="end"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="500" fill="#6E7681">
    React · Next.js · TypeScript · Supabase
  </text>

  <rect x="0.5" y="0.5" width="1199" height="199" rx="0" fill="none" stroke="#21262D" stroke-width="1"/>
</svg>
