<svg viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wib-title">
  <title id="wib-title">Why I Build</title>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060D19"/>
      <stop offset="100%" stop-color="#0D1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1F6FEB" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#1F6FEB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1F6FEB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="100" fill="url(#bg)"/>
  <rect width="1200" height="100" fill="url(#glow)"/>

  <!-- Grid dots -->
  <g opacity="0.12" fill="#3B82F6">
    <circle cx="100" cy="25" r="1"/>
    <circle cx="200" cy="25" r="1"/>
    <circle cx="300" cy="25" r="1"/>
    <circle cx="400" cy="25" r="1"/>
    <circle cx="500" cy="25" r="1"/>
    <circle cx="600" cy="25" r="1"/>
    <circle cx="700" cy="25" r="1"/>
    <circle cx="800" cy="25" r="1"/>
    <circle cx="900" cy="25" r="1"/>
    <circle cx="1000" cy="25" r="1"/>
    <circle cx="1100" cy="25" r="1"/>
    <circle cx="100" cy="75" r="1"/>
    <circle cx="200" cy="75" r="1"/>
    <circle cx="300" cy="75" r="1"/>
    <circle cx="400" cy="75" r="1"/>
    <circle cx="500" cy="75" r="1"/>
    <circle cx="600" cy="75" r="1"/>
    <circle cx="700" cy="75" r="1"/>
    <circle cx="800" cy="75" r="1"/>
    <circle cx="900" cy="75" r="1"/>
    <circle cx="1000" cy="75" r="1"/>
    <circle cx="1100" cy="75" r="1"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="36" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" font-weight="500" letter-spacing="4" fill="#58A6FF" fill-opacity="0.6">
    PHILOSOPHY
  </text>

  <!-- Title -->
  <text x="600" y="68" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="28" font-weight="700" letter-spacing="-0.5" fill="#E6EDF3">
    Why I Build
  </text>

  <!-- Bottom accent line -->
  <line x1="0" y1="99" x2="1200" y2="99" stroke="url(#accent)" stroke-width="1"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="99" fill="none" stroke="#21262D" stroke-width="1"/>
</svg>
