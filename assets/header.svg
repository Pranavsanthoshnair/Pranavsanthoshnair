<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" fill="none" aria-labelledby="hdr-title hdr-desc" role="img" viewBox="0 0 1200 400"><title id="hdr-title">Pranav S Nair — Full Stack Developer and AI Builder</title><desc id="hdr-desc">Animated premium header for Pranav S Nair, a CS engineering student building AI-powered software.</desc><defs><radialGradient id="ambientGlow" cx="50%" cy="50%" r="55%" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1F6FEB" stop-opacity=".1"/><stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/></radialGradient><radialGradient id="leftOrb" cx="0" cy="0" r="1" gradientTransform="translate(220 160) scale(180)" gradientUnits="userSpaceOnUse"><stop stop-color="#58A6FF" stop-opacity=".18"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/></radialGradient><radialGradient id="rightOrb" cx="0" cy="0" r="1" gradientTransform="translate(980 260) scale(200)" gradientUnits="userSpaceOnUse"><stop stop-color="#1F6FEB" stop-opacity=".14"/><stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/></radialGradient><radialGradient id="topOrb" cx="0" cy="0" r="1" gradientTransform="translate(600 80) scale(140)" gradientUnits="userSpaceOnUse"><stop stop-color="#58A6FF" stop-opacity=".1"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/></radialGradient><linearGradient id="arcLine" x1="120" x2="1080" y1="60" y2="340" gradientUnits="userSpaceOnUse"><stop stop-color="#58A6FF" stop-opacity="0"/><stop offset=".3" stop-color="#58A6FF" stop-opacity=".9"/><stop offset=".7" stop-color="#1F6FEB" stop-opacity=".7"/><stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/></linearGradient><linearGradient id="arcLine2" x1="180" x2="1020" y1="320" y2="80" gradientUnits="userSpaceOnUse"><stop stop-color="#1F6FEB" stop-opacity="0"/><stop offset=".4" stop-color="#1F6FEB" stop-opacity=".3"/><stop offset=".8" stop-color="#58A6FF" stop-opacity=".2"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/></linearGradient><linearGradient id="gridFade" x1="0" x2="0" y1="0" y2="400" gradientUnits="userSpaceOnUse"><stop stop-color="#1F6FEB" stop-opacity=".04"/><stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/></linearGradient><filter id="softBlur"><feGaussianBlur stdDeviation="30"/></filter><filter id="nodeGlow"><feGaussianBlur stdDeviation="8"/></filter><style>.eyebrow{fill:#64748b}.nameText{fill:#0b1220}.subtitleText{fill:#475569}.pillBg{fill-opacity:.08;stroke:#1f6feb;stroke-opacity:.25;stroke-width:1.2}.pillBg,.pillLabel{fill:#1f6feb}@media (prefers-color-scheme:dark){.eyebrow{fill:#8b949e}.nameText{fill:#e6edf3}.subtitleText{fill:#8b949e}.pillBg{fill:#1f6feb;fill-opacity:.12;stroke:#58a6ff;stroke-opacity:.35;stroke-width:1.2}.pillLabel{fill:#58a6ff}}</style></defs><rect width="1200" height="400" fill="url(#ambientGlow)"/><circle cx="220" cy="160" r="180" fill="url(#leftOrb)"/><circle cx="980" cy="260" r="200" fill="url(#rightOrb)"/><circle cx="600" cy="80" r="140" fill="url(#topOrb)"/><g opacity=".4"><line x1="200" x2="200" y1="0" y2="400" stroke="url(#gridFade)" stroke-width="1"/><line x1="400" x2="400" y1="0" y2="400" stroke="url(#gridFade)" stroke-width="1"/><line x1="600" x2="600" y1="0" y2="400" stroke="url(#gridFade)" stroke-width="1"/><line x1="800" x2="800" y1="0" y2="400" stroke="url(#gridFade)" stroke-width="1"/><line x1="1000" x2="1000" y1="0" y2="400" stroke="url(#gridFade)" stroke-width="1"/><line x1="0" x2="1200" y1="100" y2="100" stroke="url(#gridFade)" stroke-width="1"/><line x1="0" x2="1200" y1="200" y2="200" stroke="url(#gridFade)" stroke-width="1"/><line x1="0" x2="1200" y1="300" y2="300" stroke="url(#gridFade)" stroke-width="1"/></g><path fill="none" stroke="url(#arcLine)" stroke-dasharray="1400" stroke-dashoffset="1400" stroke-width="1.6" d="M120 310 C300 100, 520 60, 600 90 C720 130, 900 80, 1080 220"><animate fill="freeze" attributeName="stroke-dashoffset" calcMode="spline" dur="3s" keySplines="0.4 0 0.2 1" values="1400;0"/></path><path fill="none" stroke="url