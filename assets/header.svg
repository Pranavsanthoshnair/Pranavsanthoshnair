<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hdr-title hdr-desc">
  <title id="hdr-title">Pranav S Nair — Full Stack Developer and AI Builder</title>
  <desc id="hdr-desc">Animated premium header for Pranav S Nair, a CS engineering student building AI-powered software.</desc>

  <defs>
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F6FEB" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftOrb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 160) scale(180)">
      <stop stop-color="#58A6FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightOrb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 260) scale(200)">
      <stop stop-color="#1F6FEB" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topOrb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 80) scale(140)">
      <stop stop-color="#58A6FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arcLine" x1="120" y1="60" x2="1080" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#58A6FF" stop-opacity="0.9"/>
      <stop offset="0.7" stop-color="#1F6FEB" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcLine2" x1="180" y1="320" x2="1020" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F6FEB" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#1F6FEB" stop-opacity="0.3"/>
      <stop offset="0.8" stop-color="#58A6FF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F6FEB" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .eyebrow { fill: #64748B; }
      .nameText { fill: #0B1220; }
      .subtitleText { fill: #475569; }
      .pillBg { fill: #1F6FEB; fill-opacity: 0.08; stroke: #1F6FEB; stroke-opacity: 0.25; stroke-width: 1.2; }
      .pillLabel { fill: #1F6FEB; }
      @media (prefers-color-scheme: dark) {
        .eyebrow { fill: #8B949E; }
        .nameText { fill: #E6EDF3; }
        .subtitleText { fill: #8B949E; }
        .pillBg { fill: #1F6FEB; fill-opacity: 0.12; stroke: #58A6FF; stroke-opacity: 0.35; stroke-width: 1.2; }
        .pillLabel { fill: #58A6FF; }
      }
    </style>
  </defs>

  <!-- Background orbs -->
  <rect width="1200" height="400" fill="url(#ambientGlow)"/>
  <circle cx="220" cy="160" r="180" fill="url(#leftOrb)"/>
  <circle cx="980" cy="260" r="200" fill="url(#rightOrb)"/>
  <circle cx="600" cy="80" r="140" fill="url(#topOrb)"/>

  <!-- Subtle grid -->
  <g opacity="0.4">
    <line x1="200" y1="0" x2="200" y2="400" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="url(#gridFade)" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="url(#gridFade)" stroke-width="1"/>
  </g>

  <!-- Primary animated arc -->
  <path d="M120 310 C300 100, 520 60, 600 90 C720 130, 900 80, 1080 220" stroke="url(#arcLine)" stroke-width="1.6" fill="none" stroke-dasharray="1400" stroke-dashoffset="1400">
    <animate attributeName="stroke-dashoffset" values="1400;0" dur="3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- Secondary arc -->
  <path d="M180 90 C380 230, 560 280, 680 240 C820 190, 960 300, 1100 180" stroke="url(#arcLine2)" stroke-width="1.2" fill="none"/>

  <!-- Tertiary soft arc -->
  <path d="M0 260 C250 180, 480 120, 700 160 C880 190, 1050 300, 1200 230" stroke="#58A6FF" stroke-opacity="0.06" stroke-width="1" fill="none"/>

  <!-- Node dots with glow halos -->
  <g filter="url(#nodeGlow)">
    <circle cx="600" cy="90" r="14" fill="#58A6FF" fill-opacity="0.2">
      <animate attributeName="r" values="12;18;12" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="180" r="10" fill="#1F6FEB" fill-opacity="0.18">
      <animate attributeName="r" values="8;14;8" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="150" r="10" fill="#58A6FF" fill-opacity="0.18">
      <animate attributeName="r" values="8;14;8" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sharp node dots -->
  <circle cx="600" cy="90" r="4" fill="#58A6FF">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="180" r="3.5" fill="#1F6FEB">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="150" r="3.5" fill="#58A6FF">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="280" r="3" fill="#1F6FEB" fill-opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="250" r="3" fill="#58A6FF" fill-opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Eyebrow -->
  <text class="eyebrow" x="600" y="148" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" letter-spacing="3">FULL STACK &nbsp;·&nbsp; ARTIFICIAL INTELLIGENCE &nbsp;·&nbsp; PRODUCT ENGINEERING</text>

  <!-- Name -->
  <text class="nameText" x="600" y="220" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-2">Pranav S Nair</text>

  <!-- Subtitle -->
  <text class="subtitleText" x="600" y="263" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="0.2">Building polished AI-powered software for real-world problems</text>

  <!-- Pill badge -->
  <rect class="pillBg" x="438" y="292" width="324" height="46" rx="23"/>
  <text class="pillLabel" x="600" y="321" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" letter-spacing="0.5">Always Learning. &nbsp; Always Shipping.</text>
</svg>
