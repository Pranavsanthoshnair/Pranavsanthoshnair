<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wib-title">
  <title id="wib-title">Why I Build — Pranav S Nair</title>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F7FF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#1F6FEB" stop-opacity="0.9"/>
      <stop offset="0.7" stop-color="#58A6FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1F6FEB" flood-opacity="0.06"/>
    </filter>
    <filter id="orbBlur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <style>
      .heading { fill: #0F172A; }
      .body { fill: #334155; }
      .accent { fill: #1F6FEB; }
      .muted { fill: #64748B; }
      @media (prefers-color-scheme: dark) {
        .heading { fill: #E6EDF3; }
        .body { fill: #94A3B8; }
        .accent { fill: #58A6FF; }
        .muted { fill: #8B949E; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="24" fill="url(#cardBg)"/>

  <!-- Ambient orbs -->
  <circle cx="120" cy="160" r="80" fill="#1F6FEB" fill-opacity="0.07" filter="url(#orbBlur)">
    <animate attributeName="r" values="75;95;75" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="120" r="70" fill="#58A6FF" fill-opacity="0.06" filter="url(#orbBlur)">
    <animate attributeName="r" values="65;85;65" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer border -->
  <rect x="1" y="1" width="1198" height="318" rx="24" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Left accent line -->
  <rect x="60" y="20" width="3" height="280" rx="2" fill="url(#accentLine)"/>

  <!-- Pill label -->
  <rect x="80" y="36" width="136" height="30" rx="15" fill="url(#pillGrad)"/>
  <text x="148" y="56" text-anchor="middle" fill="white" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">WHY I BUILD</text>

  <!-- Eyebrow quote -->
  <text class="muted" x="80" y="102" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="14" font-style="italic">Where product judgment, automation, and AI converge — that's where I work.</text>

  <!-- Body text line 1 -->
  <text class="body" x="80" y="142" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">I build because useful software can make complex work feel lighter — verifying an insurance claim,</text>
  <!-- Body text line 2 -->
  <text class="body" x="80" y="166" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">helping a learner study offline in a rural village, or giving people clearer context around the news they</text>
  <!-- Body text line 3 -->
  <text class="body" x="80" y="190" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">read. I'm a CS Engineering student who cares about the gap between what AI can do and what people</text>
  <!-- Body text line 4 -->
  <text class="body" x="80" y="214" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">actually experience. Automation should reduce friction, not create it.</text>

  <!-- Three stat chips at bottom -->
  <rect x="80" y="248" width="170" height="36" rx="18" fill="#1F6FEB" fill-opacity="0.08" stroke="#1F6FEB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="165" y="271" text-anchor="middle" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Real Problems</text>

  <rect x="264" y="248" width="160" height="36" rx="18" fill="#1F6FEB" fill-opacity="0.08" stroke="#1F6FEB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="344" y="271" text-anchor="middle" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Polished Products</text>

  <rect x="438" y="248" width="160" height="36" rx="18" fill="#1F6FEB" fill-opacity="0.08" stroke="#1F6FEB" stroke-opacity="0.2" stroke-width="1"/>
  <text x="518" y="271" text-anchor="middle" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Meaningful Impact</text>

  <!-- Animated dot trail on right -->
  <circle cx="1080" cy="248" r="4" fill="#1F6FEB">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="248" r="4" fill="#58A6FF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1120" cy="248" r="4" fill="#1F6FEB">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
