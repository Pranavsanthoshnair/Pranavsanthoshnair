<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" fill="none" aria-labelledby="wib-title" role="img" viewBox="0 0 1200 320"><title id="wib-title">Why I Build — Pranav S Nair</title><defs><linearGradient id="cardBg" x1="0" x2="1200" y1="0" y2="320" gradientUnits="userSpaceOnUse"><stop stop-color="#F0F7FF"/><stop offset="1" stop-color="#EAF3FF"/></linearGradient><linearGradient id="accentLine" x1="0" x2="0" y1="0" y2="280" gradientUnits="userSpaceOnUse"><stop stop-color="#58A6FF" stop-opacity="0"/><stop offset=".3" stop-color="#1F6FEB" stop-opacity=".9"/><stop offset=".7" stop-color="#58A6FF" stop-opacity=".9"/><stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/></linearGradient><linearGradient id="pillGrad" x1="0" x2="180" y1="0" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#1F6FEB"/><stop offset="1" stop-color="#58A6FF"/></linearGradient><linearGradient id="borderGrad" x1="0" x2="1200" y1="0" y2="320" gradientUnits="userSpaceOnUse"><stop stop-color="#58A6FF" stop-opacity=".25"/><stop offset="1" stop-color="#1F6FEB" stop-opacity=".08"/></linearGradient><filter id="cardShadow"><feDropShadow dx="0" dy="4" flood-color="#1F6FEB" flood-opacity=".06" stdDeviation="12"/></filter><filter id="orbBlur"><feGaussianBlur stdDeviation="40"/></filter><style>.body{fill:#334155}.muted{fill:#64748b}@media (prefers-color-scheme:dark){.body{fill:#94a3b8}.muted{fill:#8b949e}}</style></defs><rect width="1200" height="320" fill="url(#cardBg)" rx="24"/><circle cx="120" cy="160" r="80" fill="#1F6FEB" fill-opacity=".07" filter="url(#orbBlur)"><animate attributeName="r" dur="7s" repeatCount="indefinite" values="75;95;75"/></circle><circle cx="1100" cy="120" r="70" fill="#58A6FF" fill-opacity=".06" filter="url(#orbBlur)"><animate attributeName="r" dur="9s" repeatCount="indefinite" values="65;85;65"/></circle><rect width="1198" height="318" x="1" y="1" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" rx="24"/><rect width="3" height="280" x="60" y="20" fill="url(#accentLine)" rx="2"/><rect width="136" height="30" x="80" y="36" fill="url(#pillGrad)" rx="15"/><text x="148" y="56" fill="#fff" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" text-anchor="middle">WHY I BUILD</text><text x="80" y="102" class="muted" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="14" font-style="italic">Where product judgment, automation, and AI converge — that&apos;s where I work.</text><text x="80" y="142" class="body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">I build because useful software can make complex work feel lighter — verifying an insurance claim,</text><text x="80" y="166" class="body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">helping a learner study offline in a rural village, or giving people clearer context around the news they</text><text x="80" y="190" class="body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">read. I&apos;m a CS Engineering student who cares about the gap between what AI can do and what people</text><text x="80" y="214" class="body" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="15.5" font-weight="400">actually experience. Automation should reduce friction, not create it.</text><rect width="170" height="36" x="80" y="248" fill="#1F6FEB" fill-opacity=".08" stroke="#1F6FEB" stroke-opacity=".2" stroke-width="1" rx="18"/><text x="165" y="271" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Real Problems</text><rect width="160" height="36" x="264" y="248" fill="#1F6FEB" fill-opacity=".08" stroke="#1F6FEB" stroke-opacity=".2" stroke-width="1" rx="18"/><text x="344" y="271" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Polished Products</text><rect width="160" height="36" x="438" y="248" fill="#1F6FEB" fill-opacity=".08" stroke="#1F6FEB" stroke-opacity=".2" stroke-width="1" rx="18"/><text x="518" y="271" fill="#1F6FEB" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Meaningful Impact</text><circle cx="1080" cy="248" r="4" fill="#1F6FEB"><animate attributeName="opacity" dur="1.8s" repeatCount="indefinite" values="0.2;1;0.2"/></circle><circle cx="1100" cy="248" r="4" fill="#58A6FF"><animate attributeName="opacity" begin="0.3s" dur="1.8s" repeatCount="indefinite" values="0.2;1;0.2"/></circle><circle cx="1120" cy="248" r="4" fill="#1F6FEB"><animate attributeName="opacity" begin="0.6s" dur="1.8s" repeatCount="indefinite" values="0.2;1;0.2"/></circle></svg>